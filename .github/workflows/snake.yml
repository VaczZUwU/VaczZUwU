name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: VaczZUwU
          outputs: |
            dist/snake.svg?color_snake=%23000000&color_dots=%23eeeeee,%23bbbbbb,%23888888,%23555555,%23000000

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{secrets.GITHUB_TOKEN}} 
          publish_branch: output
          publish_dir: ./dist
