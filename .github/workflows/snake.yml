name: Generate Snake
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: VaczZUwU
          outputs: |
            dist/snake.svg?color_snake=%23000000&color_dots=%23eeeeee,%23bbbbbb,%23888888,%23555555,%23000000
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: $ secrets.GITHUB_TOKEN 
